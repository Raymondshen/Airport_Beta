name: Airport Wait Time Sync

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/3 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Added node-fetch to ensure the script can hit the LocusLabs API
        run: npm install @supabase/supabase-js node-fetch

      - name: Run Airport Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Ensure this matches your filename (e.g., airport-sync.js)
        run: node .github/scripts/airport-sync.js
